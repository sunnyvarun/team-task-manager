<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TaskFlow - Modern team task management platform. Collaborate, organize, and deliver projects faster." />
    <meta name="theme-color" content="#5c7cfa" />
    
    <title>TaskFlow - Team Task Manager</title>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Inter font - all weights -->
    <link 
      href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" 
      rel="stylesheet"
    />
    
    <!-- Inline critical CSS to prevent FOUC -->
    <style>
      /* Prevent flash of unstyled content */
      html { visibility: visible; opacity: 1; }
      
      /* Minimal body styling before CSS loads */
      body {
        margin: 0;
        background-color: #f8f9fa;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      
      /* Smooth initial loader */
      .initial-loader {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #f8f9fa;
      }
      
      .initial-loader-spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #e9ecef;
        border-top-color: #5c7cfa;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <!-- Initial loading state -->
    <div id="root">
      <div class="initial-loader">
        <div class="initial-loader-spinner"></div>
      </div>
    </div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
